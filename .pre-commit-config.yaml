# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # Golangci-lint for Go code (using local installation)
  - repo: local
    hooks:
      - id: golangci-lint
        name: Golangci lint
        entry: golangci-lint run --fix
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

  # Go build check
  - repo: local
    hooks:
      - id: go-build
        name: Go build
        entry: go build
        args: ['./...']
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

  # Go build check
  - repo: local
    hooks:
      - id: docker-build
        name: Docker build
        entry: make docker-build
        language: system
        types: [go] # FIXME maybe add SQL as well?
        pass_filenames: false
        stages: [pre-commit]

  # Run all tests on pre-push (updated to use new stage name)
  - repo: local
    hooks:
      - id: run-tests
        name: Run tests
        entry: make test
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Markdown lint check with exclusions
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        stages: [pre-commit]
        name: Markdown lint
        entry: markdownlint
        args: [--fix, --config, .markdownlint.json]
        language: node
        types: [markdown]
        exclude: |
            (?x)^(
                AGENTS\.md$|
                docs/old\.md$|
                openspec/.*
            )$

  # Hadolint for Dockerfile linting
  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles
        language: docker_image
        types: ["dockerfile"]
        entry: ghcr.io/hadolint/hadolint hadolint

ci:
  skip: [golangci-lint, go-build, docker-build, run-tests] # These are already covered by `commit.yml` Github Actions
  autofix_commit_msg: |
    fix(lint): apply pre-commit lints

    For more information, see https://pre-commit.ci
  autoupdate_commit_msg: |
    chore(ci): update pre-commit dependencies

    For more information, see https://pre-commit.ci
