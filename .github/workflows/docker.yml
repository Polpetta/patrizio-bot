name: Build docker images

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  release:
    types: [published]
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  hadolint:
    runs-on: ubuntu-latest
    name: Dockerfile linting
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  setup:
    runs-on: ubuntu-latest
    name: Setup
    outputs:
      should_push: ${{ steps.gate.outputs.value }}
      registry_image: ${{ steps.image.outputs.value }}
    steps:
      - name: Compute registry image name
        id: image
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Compute push gate
        id: gate
        run: echo "value=${{ github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/renovate/') }}" >> "$GITHUB_OUTPUT"

  docker:
    needs: [hadolint, setup]
    strategy:
      matrix:
        targetarch: [amd64, arm64]
        include:
          - targetarch: amd64
            os: ubuntu-latest
            platform: linux/amd64
          - targetarch: arm64
            os: ubuntu-26.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    name: Image (${{ matrix.targetarch }})
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Docker metadata generation
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ${{ needs.setup.outputs.registry_image }}
          # The tags are:
          # 1 - develop only if main
          # 2 - pr related tags
          # 3 - semver related tags
          # 4 - branch related tags (but not `main`, to avoid confusion)
          # 5 - manually triggered images
          tags: |
            type=raw,value=develop,priority=900,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,enable=true,priority=600,prefix=pr-,suffix=,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Login to GHCR
        if: needs.setup.outputs.should_push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.targetarch }}
          cache-to: type=gha,scope=${{ matrix.targetarch }},mode=max
          provenance: true
          sbom: true
          outputs: type=image,name=${{ needs.setup.outputs.registry_image }},push-by-digest=true,name-canonical=true,push=${{ needs.setup.outputs.should_push }}
      - name: Export digest
        if: needs.setup.outputs.should_push == 'true'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        if: needs.setup.outputs.should_push == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ matrix.targetarch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [docker, setup]
    if: needs.setup.outputs.should_push == 'true'
    runs-on: ubuntu-latest
    name: Merge multi-arch manifest
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata generation
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ${{ needs.setup.outputs.registry_image }}
          # The tags are:
          # 1 - develop only if main
          # 2 - pr related tags
          # 3 - semver related tags
          # 4 - branch related tags (but not `main`, to avoid confusion)
          # 5 - manually triggered images
          tags: |
            type=raw,value=develop,priority=900,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,enable=true,priority=600,prefix=pr-,suffix=,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.setup.outputs.registry_image }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect ${{ needs.setup.outputs.registry_image }}:${{ steps.meta.outputs.version }}
