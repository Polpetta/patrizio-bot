name: Commit check

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  go-checks:
    name: Golang related checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: Clone repository
      - uses: actions/setup-go@v4
        name: Set up Go
        with:
          go-version: '1.25'

      - name: Golang-ci lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: Go build
        run: go build ./...

      - name: Run tests
        run: make test

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64, linux/arm64
          push: false
