name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "⬆️ Dependencies"
    label: "dependencies"
  - title: "📚 Documentation"
    label: "documentation"
  - title: "🧰 Maintenance"
    labels:
      - "ci"
      - "chore"
exclude-labels:
  - "skip-changelog"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch
template: |
  ## What’s Changed

  $CHANGES
autolabeler:
  - label: "documentation"
    files:
      - "docs/**/*.md"
  - label: "bug"
    branch:
      - '/fix\/.+/'
  - label: "enhancement"
    branch:
      - '/feat\/.+/'
  - label: "chore"
    branch:
      - '/chore\/.+/'
